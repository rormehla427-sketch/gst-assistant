<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>GSTCopilot — AI-Powered Compliance for MSMEs</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#0a0e1a;color:#e8edf8;min-height:100vh;overflow-x:hidden}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:#0f1628}
::-webkit-scrollbar-thumb{background:#2a3a5c;border-radius:3px}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.85)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.fade-up{animation:fadeUp .35s ease forwards}
input,select,textarea{font-family:'DM Sans',sans-serif}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef}=React;

// ── DATA ──────────────────────────────────────────────────────────────────────
const DEADLINES=[
  {id:1,name:"GSTR-1",due:"2024-02-11",status:"pending",type:"Monthly",daysLeft:5},
  {id:2,name:"GSTR-3B",due:"2024-02-20",status:"pending",type:"Monthly",daysLeft:14},
  {id:3,name:"GSTR-9",due:"2024-12-31",status:"upcoming",type:"Annual",daysLeft:314},
  {id:4,name:"GSTR-2B",due:"2024-01-14",status:"completed",type:"Monthly",daysLeft:0},
];
const NOTICES=[
  {id:1,gstNo:"27AAACR5055K1Z5",type:"ASMT-10",date:"2024-01-22",amount:"₹1,24,500",risk:"High",status:"Action Required",detail:"ITC mismatch for Q2 FY23-24. GSTR-2A vs GSTR-3B variance of ₹1,24,500 detected. Discrepancy likely due to vendors not filing GSTR-1 on time."},
  {id:2,gstNo:"27AAACR5055K1Z5",type:"CMP-05",date:"2024-01-15",amount:"₹18,200",risk:"Medium",status:"Response Sent",detail:"Discrepancy in turnover declared vs e-way bill data for December 2023. Department comparing sales reported vs goods movement records."},
  {id:3,gstNo:"29GGGGG1314R9Z6",type:"RFN-01",date:"2024-01-08",amount:"₹42,000",risk:"Low",status:"Resolved",detail:"Refund application query for IGST paid on exports under LUT for Q3 FY23-24. Refund sanctioned post verification."},
];
const INVOICES=[
  {id:1,vendor:"Reliance Retail Ltd",gstin:"27AAACR5055K1Z5",invNo:"RR/2024/1234",date:"2024-01-15",amount:"₹84,500",itc:"₹15,210",status:"matched",gstr2b:"Yes"},
  {id:2,vendor:"Tata Motors Ltd",gstin:"27AAACT2727Q1Z8",invNo:"TML/2024/5678",date:"2024-01-18",amount:"₹2,45,000",itc:"₹44,100",status:"mismatch",gstr2b:"No"},
  {id:3,vendor:"Infosys BPO Ltd",gstin:"29AABCI1681G1ZJ",invNo:"IBP/2024/9012",date:"2024-01-20",amount:"₹1,12,000",itc:"₹20,160",status:"matched",gstr2b:"Yes"},
  {id:4,vendor:"Wipro Ltd",gstin:"29AABCW0788B1ZP",invNo:"WPR/2024/3456",date:"2024-01-22",amount:"₹67,800",itc:"₹12,204",status:"mismatch",gstr2b:"Partial"},
  {id:5,vendor:"Hindustan Unilever",gstin:"27AAACH1458H1ZE",invNo:"HUL/2024/7890",date:"2024-01-25",amount:"₹3,21,000",itc:"₹57,780",status:"matched",gstr2b:"Yes"},
];
const CLIENTS=[
  {id:1,name:"Rajesh Traders Pvt Ltd",gstin:"27AAACR1234K1Z5",turnover:"₹2.4Cr",filings:12,pending:2,health:85,plan:"Growth"},
  {id:2,name:"Mehta Exports Pvt Ltd",gstin:"27AABCM5055K1Z2",turnover:"₹8.7Cr",filings:12,pending:0,health:98,plan:"Enterprise"},
  {id:3,name:"Sunrise Electronics",gstin:"29AABCS6789L1Z1",turnover:"₹1.1Cr",filings:11,pending:3,health:62,plan:"Starter"},
  {id:4,name:"Patel Constructions",gstin:"24AAECR9876B1Z3",turnover:"₹5.2Cr",filings:12,pending:1,health:91,plan:"Growth"},
  {id:5,name:"Sharma Medical Store",gstin:"09AABCS3456M1ZX",turnover:"₹45L",filings:10,pending:4,health:45,plan:"Starter"},
];

// ── HELPERS ───────────────────────────────────────────────────────────────────
const S={
  page:{padding:32,maxWidth:1400,margin:"0 auto"},
  card:(extra={})=>({background:"#1a2340",border:"1px solid #2a3a5c",borderRadius:16,padding:24,...extra}),
  flex:(gap=12,extra={})=>({display:"flex",alignItems:"center",gap,...extra}),
  grid:(cols,gap=16)=>({display:"grid",gridTemplateColumns:cols,gap}),
};
const hc=(h)=>h>=85?"#22c55e":h>=60?"#eab308":"#ef4444";
const badgeStyle={green:{bg:"rgba(34,197,94,.15)",c:"#22c55e",b:"rgba(34,197,94,.3)"},red:{bg:"rgba(239,68,68,.15)",c:"#ef4444",b:"rgba(239,68,68,.3)"},yellow:{bg:"rgba(234,179,8,.15)",c:"#eab308",b:"rgba(234,179,8,.3)"},blue:{bg:"rgba(59,130,246,.15)",c:"#3b82f6",b:"rgba(59,130,246,.3)"},orange:{bg:"rgba(249,115,22,.15)",c:"#f97316",b:"rgba(249,115,22,.3)"}};

function Badge({t,children}){const s=badgeStyle[t]||badgeStyle.blue;return(<span style={{display:"inline-flex",alignItems:"center",padding:"3px 10px",borderRadius:20,fontSize:11,fontWeight:600,textTransform:"uppercase",letterSpacing:".06em",background:s.bg,color:s.c,border:`1px solid ${s.b}`}}>{children}</span>);}

const btnStyles={
  primary:"linear-gradient(135deg,#f97316,#c2410c)",
  green:"linear-gradient(135deg,#22c55e,#16a34a)",
  blue:"linear-gradient(135deg,#3b82f6,#1d4ed8)",
  red:"linear-gradient(135deg,#ef4444,#b91c1c)",
};
function Btn({type="primary",size="md",children,onClick,style={}}){
  const bg=btnStyles[type];
  const sz={sm:{padding:"7px 14px",fontSize:12},md:{padding:"10px 20px",fontSize:14},lg:{padding:"13px 26px",fontSize:15}};
  const isGrad=!!bg;
  return(<button onClick={onClick} style={{display:"inline-flex",alignItems:"center",gap:8,borderRadius:10,border:isGrad?"none":"1px solid #2a3a5c",cursor:"pointer",fontFamily:"'DM Sans',sans-serif",fontWeight:500,transition:"all .2s",whiteSpace:"nowrap",background:bg||"#1f2a4a",color:isGrad?"white":"#e8edf8",...sz[size],...style}}
    onMouseEnter={e=>e.currentTarget.style.transform="translateY(-1px)"}
    onMouseLeave={e=>e.currentTarget.style.transform="translateY(0)"}
  >{children}</button>);
}

function StatCard({icon,label,value,change,color="#f97316",sub}){return(
  <div style={{...S.card(),position:"relative",overflow:"hidden"}}>
    <div style={{position:"absolute",top:-30,right:-30,width:100,height:100,borderRadius:"50%",background:color,opacity:.08}}/>
    <div style={{fontSize:28,marginBottom:12}}>{icon}</div>
    <div style={{fontSize:12,color:"#8a9bc4",textTransform:"uppercase",letterSpacing:".08em",marginBottom:8}}>{label}</div>
    <div style={{fontFamily:"'Syne',sans-serif",fontSize:24,fontWeight:800,marginBottom:4}}>{value}</div>
    {change&&<div style={{fontSize:12,color:change.startsWith("↑")||change.startsWith("+")||change.startsWith("✅")?"#22c55e":change.startsWith("↓")?"#ef4444":"#8a9bc4"}}>{change}</div>}
    {sub&&<div style={{fontSize:12,color:"#8a9bc4"}}>{sub}</div>}
  </div>
);}

function Topbar({title,subtitle}){return(
  <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"16px 32px",borderBottom:"1px solid #2a3a5c",background:"#0f1628",position:"sticky",top:0,zIndex:50}}>
    <div>
      <h2 style={{fontFamily:"'Syne',sans-serif",fontSize:18,fontWeight:800}}>{title}</h2>
      {subtitle&&<p style={{fontSize:12,color:"#8a9bc4",marginTop:2}}>{subtitle}</p>}
    </div>
    <div style={{display:"flex",gap:12,alignItems:"center"}}>
      <div style={{background:"rgba(34,197,94,.15)",border:"1px solid rgba(34,197,94,.3)",color:"#22c55e",padding:"5px 12px",borderRadius:20,fontSize:12,fontWeight:600}}>🟢 GSP Connected</div>
      <div style={{width:36,height:36,borderRadius:"50%",background:"linear-gradient(135deg,#f97316,#c2410c)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,cursor:"pointer"}}>🔔</div>
    </div>
  </div>
);}

function Section({title,right,children,mb=20}){return(
  <div style={{marginBottom:mb}}>
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}>
      <h3 style={{fontFamily:"'Syne',sans-serif",fontSize:15,fontWeight:700}}>{title}</h3>
      {right}
    </div>
    {children}
  </div>
);}

// ── SIDEBAR ────────────────────────────────────────────────────────────────────
function Sidebar({active,setActive}){
  const[col,setCol]=useState(false);
  const nav=[
    {id:"dashboard",icon:"⚡",label:"Dashboard"},
    {id:"gst",icon:"📋",label:"GST Filing"},
    {id:"notices",icon:"⚠️",label:"Notice Handler",badge:3},
    {id:"invoices",icon:"🧾",label:"Reconciliation"},
    {id:"ca",icon:"👥",label:"CA Dashboard"},
    {id:"ai",icon:"🤖",label:"AI Advisor"},
  ];
  return(
  <aside style={{width:col?72:260,background:"#0f1628",borderRight:"1px solid #2a3a5c",display:"flex",flexDirection:"column",position:"fixed",top:0,left:0,bottom:0,zIndex:100,transition:"width .3s cubic-bezier(.4,0,.2,1)",overflow:"hidden"}}>
    <div style={{display:"flex",alignItems:"center",gap:12,padding:"22px 18px",borderBottom:"1px solid #2a3a5c"}}>
      <div style={{width:40,height:40,borderRadius:10,flexShrink:0,background:"linear-gradient(135deg,#f97316,#c2410c)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,boxShadow:"0 4px 15px rgba(249,115,22,.4)"}}>₹</div>
      {!col&&<div>
        <div style={{fontFamily:"'Syne',sans-serif",fontSize:17,fontWeight:800}}>GST<span style={{color:"#f97316"}}>Copilot</span></div>
        <div style={{fontSize:10,color:"#5a6b8a",marginTop:1}}>AI-Powered Compliance</div>
      </div>}
      <button onClick={()=>setCol(!col)} style={{marginLeft:"auto",background:"none",border:"none",cursor:"pointer",color:"#8a9bc4",fontSize:16,padding:4,flexShrink:0,borderRadius:6}}>{col?"→":"←"}</button>
    </div>
    <nav style={{flex:1,padding:"12px 10px",display:"flex",flexDirection:"column",gap:3}}>
      {!col&&<div style={{fontSize:10,letterSpacing:".1em",color:"#5a6b8a",textTransform:"uppercase",padding:"10px 10px 5px"}}>Menu</div>}
      {nav.map(n=>(
        <div key={n.id} onClick={()=>setActive(n.id)} style={{display:"flex",alignItems:"center",gap:12,padding:"11px 12px",borderRadius:10,cursor:"pointer",background:active===n.id?"linear-gradient(135deg,rgba(249,115,22,.2),rgba(249,115,22,.05))":"none",color:active===n.id?"#f97316":"#8a9bc4",border:active===n.id?"1px solid rgba(249,115,22,.2)":"1px solid transparent",transition:"all .2s",position:"relative",whiteSpace:"nowrap"}}
          onMouseEnter={e=>{if(active!==n.id){e.currentTarget.style.background="#1a2340";e.currentTarget.style.color="#e8edf8";} }}
          onMouseLeave={e=>{if(active!==n.id){e.currentTarget.style.background="none";e.currentTarget.style.color="#8a9bc4";} }}
        >
          {active===n.id&&<div style={{position:"absolute",left:0,top:"20%",bottom:"20%",width:3,background:"#f97316",borderRadius:"0 2px 2px 0"}}/>}
          <span style={{fontSize:17,flexShrink:0,width:20,textAlign:"center"}}>{n.icon}</span>
          {!col&&<><span style={{fontSize:14,fontWeight:500}}>{n.label}</span>{n.badge&&<span style={{marginLeft:"auto",background:"#ef4444",color:"white",fontSize:10,fontWeight:700,padding:"2px 6px",borderRadius:20}}>{n.badge}</span>}</>}
        </div>
      ))}
    </nav>
    <div style={{padding:16,borderTop:"1px solid #2a3a5c"}}>
      <div style={{display:"flex",alignItems:"center",gap:10,padding:10,borderRadius:10,cursor:"pointer"}}>
        <div style={{width:36,height:36,borderRadius:"50%",flexShrink:0,background:"linear-gradient(135deg,#3b82f6,#1d4ed8)",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,fontSize:13}}>RK</div>
        {!col&&<div><div style={{fontSize:13,fontWeight:600,whiteSpace:"nowrap"}}>Rajan Kumar</div><div style={{fontSize:11,color:"#5a6b8a",whiteSpace:"nowrap"}}>27AAACR5055K1Z5</div></div>}
      </div>
    </div>
  </aside>
  );
}

// ── DASHBOARD ─────────────────────────────────────────────────────────────────
function Dashboard({setActive}){return(
<div className="fade-up">
  <Topbar title="Dashboard" subtitle="FY 2024-25 | GSTIN: 27AAACR5055K1Z5"/>
  <div style={S.page}>
    {/* AI Banner */}
    <div style={{background:"linear-gradient(135deg,rgba(249,115,22,.1),rgba(59,130,246,.05))",border:"1px solid rgba(249,115,22,.25)",borderRadius:16,padding:"16px 20px",marginBottom:24,display:"flex",alignItems:"center",gap:16}}>
      <div style={{fontSize:28}}>🤖</div>
      <div style={{flex:1}}>
        <div style={{fontWeight:600,marginBottom:4,fontSize:15}}>AI Compliance Advisor</div>
        <div style={{fontSize:13,color:"#8a9bc4",lineHeight:1.7}}>
          <strong style={{color:"#f97316"}}>⚠️ Action needed:</strong> GSTR-3B due in <strong>5 days</strong>. Claimable ITC: <strong style={{color:"#22c55e"}}>₹1,49,454</strong>. Two invoices have GSTR-2B mismatches — fix before filing to avoid scrutiny notices.
        </div>
      </div>
      <Btn size="sm" onClick={()=>setActive("gst")}>File Now →</Btn>
    </div>

    {/* Stats */}
    <div style={{...S.grid("repeat(4,1fr)"),marginBottom:24}}>
      <StatCard icon="💰" label="Tax Paid (YTD)" value="₹18.4L" change="↑ 12% vs last year" color="#f97316"/>
      <StatCard icon="✅" label="ITC Claimed" value="₹6.2L" change="+₹1.49L available" color="#22c55e"/>
      <StatCard icon="⚠️" label="Active Notices" value="3" change="↓ 1 resolved this week" color="#ef4444"/>
      <StatCard icon="📊" label="Compliance Score" value="87%" sub="Good — above average" color="#3b82f6"/>
    </div>

    <div style={S.grid("2fr 1fr",20)}>
      {/* Deadlines */}
      <div style={S.card()}>
        <Section title="📅 Upcoming Deadlines" right={<Btn type="blue" size="sm">View All</Btn>}>
          {DEADLINES.map(d=>(
            <div key={d.id} style={{display:"flex",alignItems:"center",gap:14,padding:"12px 14px",borderRadius:12,background:"#151d35",border:"1px solid #2a3a5c",marginBottom:10}}>
              <div style={{width:40,height:40,borderRadius:10,background:d.status==="completed"?"rgba(34,197,94,.1)":d.status==="pending"?"rgba(249,115,22,.1)":"rgba(59,130,246,.1)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>
                {d.status==="completed"?"✅":d.status==="pending"?"🔥":"📅"}
              </div>
              <div style={{flex:1}}>
                <div style={{fontWeight:600,fontSize:14}}>{d.name}</div>
                <div style={{fontSize:12,color:"#8a9bc4"}}>{d.type} • Due: {d.due}</div>
              </div>
              <Badge t={d.status==="completed"?"green":d.status==="pending"?"orange":"blue"}>{d.status}</Badge>
              {d.status!=="completed"&&<Btn size="sm" onClick={()=>setActive("gst")}>File</Btn>}
            </div>
          ))}
        </Section>
      </div>

      {/* Right */}
      <div style={{display:"flex",flexDirection:"column",gap:16}}>
        <div style={S.card()}>
          <Section title="🏥 Compliance Health">
            {[{l:"Filing Timeliness",v:92,c:"#22c55e"},{l:"ITC Match Rate",v:78,c:"#3b82f6"},{l:"Invoice Accuracy",v:88,c:"#f97316"}].map(x=>(
              <div key={x.l} style={{marginBottom:14}}>
                <div style={{display:"flex",justifyContent:"space-between",fontSize:13,marginBottom:5}}>
                  <span style={{color:"#8a9bc4"}}>{x.l}</span>
                  <span style={{fontWeight:600}}>{x.v}%</span>
                </div>
                <div style={{height:6,background:"#151d35",borderRadius:3,overflow:"hidden"}}>
                  <div style={{width:`${x.v}%`,height:"100%",background:x.c,borderRadius:3}}/>
                </div>
              </div>
            ))}
          </Section>
        </div>
        <div style={S.card()}>
          <Section title="⚡ Quick Actions">
            {[{icon:"📤",label:"Upload Invoices",page:"invoices",c:"#3b82f6"},{icon:"⚠️",label:"View Notices",page:"notices",c:"#ef4444"},{icon:"🤖",label:"AI Advisor",page:"ai",c:"#f97316"},{icon:"👥",label:"CA Dashboard",page:"ca",c:"#22c55e"}].map(a=>(
              <div key={a.label} onClick={()=>setActive(a.page)} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 12px",borderRadius:10,cursor:"pointer",background:"#151d35",border:"1px solid #2a3a5c",marginBottom:8,transition:"all .2s"}}
                onMouseEnter={e=>{e.currentTarget.style.borderColor=a.c;e.currentTarget.style.color=a.c;}}
                onMouseLeave={e=>{e.currentTarget.style.borderColor="#2a3a5c";e.currentTarget.style.color="#8a9bc4";}}>
                <span style={{fontSize:18,width:24,textAlign:"center"}}>{a.icon}</span>
                <span style={{fontSize:13,fontWeight:500,color:"#8a9bc4"}}>{a.label}</span>
                <span style={{marginLeft:"auto",fontSize:14,color:"#5a6b8a"}}>→</span>
              </div>
            ))}
          </Section>
        </div>
      </div>
    </div>
  </div>
</div>
);}

// ── GST FILING ────────────────────────────────────────────────────────────────
function GSTFiling(){
  const[tab,setTab]=useState("gstr1");
  const[step,setStep]=useState(1);
  const tabs=[{id:"gstr1",l:"GSTR-1"},{id:"gstr3b",l:"GSTR-3B"},{id:"gstr9",l:"GSTR-9 Annual"},{id:"history",l:"History"}];
  const steps=[{n:1,l:"Import Data",d:"Auto-import from Tally/ERP",done:true},{n:2,l:"AI Validation",d:"Error & mismatch detection",done:true},{n:3,l:"Review & Fix",d:"Correct flagged issues",done:false},{n:4,l:"Preview Return",d:"Final review",done:false},{n:5,l:"File on GSTN",d:"Submit via GSP",done:false}];
  const issues=[
    {t:"error",icon:"🔴",title:"Incorrect HSN Code",desc:"Invoice #INV-2024-234: HSN 8471 used, correct code is 8473 for computer accessories.",fix:"Auto-Fix"},
    {t:"warn",icon:"🟡",title:"GSTR-2B Mismatch",desc:"Vendor: Tata Motors Ltd — ₹44,100 ITC not reflected in GSTR-2B. Vendor needs to file their GSTR-1.",fix:"Remind Vendor"},
    {t:"warn",icon:"🟡",title:"Reverse Charge Liability",desc:"3 invoices from unregistered dealers totaling ₹82,000. RCM liability of ₹14,760 applicable.",fix:"Calculate RCM"},
  ];
  return(
<div className="fade-up">
  <Topbar title="GST Filing Assistant" subtitle="AI-powered smart filing with error detection"/>
  <div style={S.page}>
    {/* Tabs */}
    <div style={{display:"flex",gap:4,background:"#0a0e1a",borderRadius:12,padding:4,marginBottom:24,width:"fit-content"}}>
      {tabs.map(t=>(<button key={t.id} onClick={()=>setTab(t.id)} style={{padding:"9px 20px",borderRadius:9,border:"none",background:tab===t.id?"#1a2340":"none",color:tab===t.id?"#e8edf8":"#8a9bc4",fontFamily:"'DM Sans',sans-serif",fontSize:13,fontWeight:500,cursor:"pointer",boxShadow:tab===t.id?"0 2px 8px rgba(0,0,0,.3)":"none"}}>{t.l}</button>))}
    </div>

    {/* AI Banner */}
    <div style={{background:"rgba(249,115,22,.08)",border:"1px solid rgba(249,115,22,.2)",borderRadius:14,padding:"14px 18px",marginBottom:24,display:"flex",gap:12}}>
      <span style={{fontSize:20}}>🤖</span>
      <div style={{fontSize:13,color:"#8a9bc4",lineHeight:1.8}}>
        ✅ <strong style={{color:"#e8edf8"}}>847 invoices</strong> imported from Tally &nbsp;|&nbsp;
        ⚠️ <strong style={{color:"#eab308"}}>12 errors found</strong> — fix before filing &nbsp;|&nbsp;
        💡 Claimable ITC: <strong style={{color:"#22c55e"}}>₹1,49,454</strong> &nbsp;|&nbsp;
        🔴 <strong style={{color:"#ef4444"}}>2 mismatches</strong> need vendor follow-up
      </div>
    </div>

    <div style={S.grid("220px 1fr",20)}>
      {/* Steps */}
      <div style={S.card()}>
        <div style={{fontFamily:"'Syne',sans-serif",fontSize:14,fontWeight:700,marginBottom:16}}>Filing Steps</div>
        {steps.map(s=>(
          <div key={s.n} onClick={()=>setStep(s.n)} style={{display:"flex",gap:12,alignItems:"flex-start",padding:10,borderRadius:10,cursor:"pointer",background:step===s.n?"rgba(249,115,22,.08)":"none",border:step===s.n?"1px solid rgba(249,115,22,.2)":"1px solid transparent",marginBottom:4}}>
            <div style={{width:26,height:26,borderRadius:"50%",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,background:s.done?"#22c55e":step===s.n?"#f97316":"#1f2a4a",color:(s.done||step===s.n)?"white":"#5a6b8a"}}>{s.done?"✓":s.n}</div>
            <div><div style={{fontSize:13,fontWeight:600,color:step===s.n?"#f97316":"#e8edf8"}}>{s.l}</div><div style={{fontSize:11,color:"#5a6b8a"}}>{s.d}</div></div>
          </div>
        ))}
      </div>

      {/* Main */}
      <div style={{display:"flex",flexDirection:"column",gap:16}}>

    "How much ITC can I claim?":"Based on your GSTR-2B for January 2024, you can claim ITC of ₹1,49,454. However, ₹56,304 is at risk due to vendor mismatches (Tata Motors + Wipro). Safe ITC to claim right now: ₹93,150. Recommend following up with vendors first.",

    "Next filing deadline?":"Your upcoming deadlines:\n📅 GSTR-1 → February 11, 2024 (5 days away)\n📅 GSTR-3B → February 20, 2024 (14 days away)\n\nFile GSTR-1 first — it directly impacts your customers' ITC claims.",
    "How to fix GSTR-2B mismatch?":"Steps to fix a mismatch:\n1️⃣ Check if vendor has filed GSTR-1 (most common cause)\n2️⃣ If not filed, send them a reminder (I can auto-send from Reconciliation page)\n3️⃣ Verify GSTIN & invoice details are correct\n4️⃣ Provisionally claim ITC but track for next month\n5️⃣ If vendor doesn't file, reverse the ITC claim to avoid notices\n\nWant me to generate vendor reminder emails?",
    "What is reverse charge mechanism?":"Reverse Charge Mechanism (RCM) means that YOU, as the buyer, pay the GST instead of the seller. This applies when:\n• Buying from an unregistered dealer (above ₹5,000/day)\n• Specific services like legal, GTA, import of services\n\nIn your case, 3 invoices from unregistered dealers (₹82,000 total) attract RCM liability of ₹14,760. This is flagged in your GSTR-3B filing.",
  };
  const sendMsg=(text)=>{
    const q=text||inp;if(!q.trim())return;

    setTimeout(()=>{
      const a=answers[q]||"Good question! Based on your compliance data, I'd recommend reviewing your GSTR-2B reconciliation first to maximize ITC claims. Would you like me to run a detailed check on a specific topic?";
      setMsgs(m=>[...m,{role:"ai",text:a}]);setLoading(false);

  useEffect(()=>{if(chatRef.current)chatRef.current.scrollTop=chatRef.current.scrollHeight;},[msgs,loading]);
  return(
<div className="fade-up">

  <div style={{...S.page,maxWidth:860}}>
    {/* Quick */}
    <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:20}}>
      {quick.map(q=>(
        <button key={q} onClick={()=>sendMsg(q)} style={{padding:"7px 14px",borderRadius:20,border:"1px solid #2a3a5c",background:"#1a2340",color:"#8a9bc4",fontSize:12,fontWeight:500,cursor:"pointer",fontFamily:"'DM Sans',sans-serif",transition:"all .2s"}}
          onMouseEnter={e=>{e.currentTarget.style.borderColor="#f97316";e.currentTarget.style.color="#f97316";}}
          onMouseLeave={e=>{e.currentTarget.style.borderColor="#2a3a5c";e.currentTarget.style.color="#8a9bc4";}}
        >{q}</button>
      ))}
    </div>

    <div style={{...S.card(),padding:0,overflow:"hidden"}}>
      <div ref={chatRef} style={{padding:20,height:460,overflowY:"auto",display:"flex",flexDirection:"column",gap:14}}>
        {msgs.map((m,i)=>(
          <div key={i} style={{display:"flex",gap:10,flexDirection:m.role==="user"?"row-reverse":"row"}}>
            <div style={{width:34,height:34,borderRadius:"50%",flexShrink:0,background:m.role==="ai"?"linear-gradient(135deg,#f97316,#c2410c)":"linear-gradient(135deg,#3b82f6,#1d4ed8)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14}}>
              {m.role==="ai"?"🤖":"👤"}
            </div>
            <div style={{maxWidth:"76%",background:m.role==="ai"?"linear-gradient(135deg,rgba(249,115,22,.08),rgba(249,115,22,.02))":"#1f2a4a",border:m.role==="ai"?"1px solid rgba(249,115,22,.2)":"1px solid #2a3a5c",borderRadius:m.role==="ai"?"4px 14px 14px 14px":"14px 4px 14px 14px",padding:"12px 16px",fontSize:13,color:"#e8edf8",lineHeight:1.8,whiteSpace:"pre-wrap"}}>
              {m.text}
            </div>
          </div>
        ))}
        {loading&&(
          <div style={{display:"flex",gap:10}}>
            <div style={{width:34,height:34,borderRadius:"50%",flexShrink:0,background:"linear-gradient(135deg,#f97316,#c2410c)",display:"flex",alignItems:"center",justifyContent:"center"}}>🤖</div>
            <div style={{padding:"14px 18px",background:"rgba(249,115,22,.08)",border:"1px solid rgba(249,115,22,.2)",borderRadius:"4px 14px 14px 14px",display:"flex",gap:5,alignItems:"center"}}>
              {[0,1,2].map(i=><div key={i} style={{width:8,height:8,borderRadius:"50%",background:"#f97316",animation:"pulse 1.2s ease infinite",animationDelay:`${i*.2}s`}}/>)}
            </div>
          </div>
        )}
      </div>
      <div style={{display:"flex",gap:10,padding:14,borderTop:"1px solid #2a3a5c",background:"#151d35"}}>
        <input value={inp} onChange={e=>setInp(e.target.value)} onKeyDown={e=>e.key==="Enter"&&sendMsg()}
          placeholder="GST के बारे में पूछें... (English या हिंदी में)" style={{flex:1,background:"#1a2340",border:"1px solid #2a3a5c",color:"#e8edf8",borderRadius:10,padding:"10px 14px",fontSize:14,outline:"none"}}/>
        <Btn onClick={()=>sendMsg()}>Send ✈️</Btn>
      </div>
    </div>
  </div>
</div>
);}

// ── ROOT ──────────────────────────────────────────────────────────────────────
function App(){
  const[active,setActive]=useState("dashboard");
  const pages={dashboard:<Dashboard setActive={setActive}/>,gst:<GSTFiling/>,notices:<NoticeHandler/>,invoices:<Reconciliation/>,ca:<CADashboard/>,ai:<AIAdvisor/>};
  return(
    <div style={{display:"flex",minHeight:"100vh"}}>
      <Sidebar active={active} setActive={setActive}/>
      <main style={{flex:1,marginLeft:260,minHeight:"100vh",background:"#0a0e1a",transition:"margin-left .3s"}}>
        {pages[active]}
      </main>
    </div>
  );
}
ReactDOM.render(<App/>,document.getElementById("root"));
</script>
</body>
</html>
